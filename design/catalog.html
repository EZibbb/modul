<!DOCTYPE html>
<html lang="ru" class="">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Каталог — Modul comp</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw-setup.js"></script>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/base.css" />
<script>
  (function(){ if (localStorage.getItem('modul-theme')==='dark') document.documentElement.classList.add('dark'); })();
  function toggleTheme(){ const r=document.documentElement; r.classList.toggle('dark'); localStorage.setItem('modul-theme', r.classList.contains('dark')?'dark':'light'); }
</script>
</head>
<body class="bg-background font-sans text-foreground antialiased">

<!-- ============ HEADER ============ -->
<header class="sticky top-0 z-40 border-b border-border bg-background/90 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-[1320px] items-center gap-5 px-6">
    <a href="index.html" class="flex shrink-0 items-center gap-2.5">
      <span class="flex h-8 w-8 items-center justify-center rounded-md bg-primary text-primary-foreground"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg></span>
      <span class="text-[17px] font-semibold tracking-tight">Modul<span class="font-normal text-muted-foreground">&nbsp;comp</span></span>
    </a>
    <div class="relative hidden flex-1 lg:block">
      <button data-mc-open="cmdk" class="flex h-10 w-full items-center gap-2.5 rounded-lg border border-input bg-card px-3.5 text-left shadow-xs transition hover:border-border-strong">
        <svg class="h-4 w-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <span class="mono text-sm text-muted-foreground">Поиск по артикулу — напр. MC-QSFP100G-LR4</span>
        <kbd class="mono ml-auto hidden rounded border border-border bg-muted px-1.5 py-0.5 text-2xs text-muted-foreground sm:block">⌘K</kbd>
      </button>
    </div>
    <nav class="hidden items-center gap-1 text-sm xl:flex">
      <a href="catalog.html" class="rounded-md bg-accent px-3 py-2 font-medium text-foreground">Каталог</a>
      <a href="compatibility.html" class="rounded-md px-3 py-2 text-muted-foreground hover:bg-accent hover:text-foreground">Совместимость</a>
      <a href="calculator.html" class="rounded-md px-3 py-2 text-muted-foreground hover:bg-accent hover:text-foreground">Калькулятор</a>
    </nav>
    <div class="ml-auto flex items-center gap-2 xl:ml-0">
      <button data-mc-open="ai" class="hidden h-9 items-center gap-2 rounded-md border border-primary/30 bg-primary-muted px-3 text-sm font-medium text-primary transition hover:bg-primary hover:text-primary-foreground sm:inline-flex">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a3 3 0 0 1 3 3v1a3 3 0 0 1 3 3 3 3 0 0 1-1 5.6V18a3 3 0 0 1-6 0 3 3 0 0 1-6 0v-2.4A3 3 0 0 1 4 10a3 3 0 0 1 3-3V6a3 3 0 0 1 5-3z"/></svg>ИИ-консультант
      </button>
      <button onclick="toggleTheme()" aria-label="Сменить тему" class="flex h-9 w-9 items-center justify-center rounded-md border border-border hover:bg-accent">
        <svg class="h-4 w-4 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="hidden h-4 w-4 dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <button class="inline-flex h-9 items-center gap-2 rounded-md bg-primary px-3.5 text-sm font-medium text-primary-foreground shadow-xs hover:bg-primary-hover">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h2l2 11h9l2-7H7"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
        <span class="hidden sm:inline">Спецификация</span> <span class="mono rounded bg-primary-foreground/20 px-1.5 text-2xs">5</span>
      </button>
    </div>
  </div>
</header>

<!-- ============ SUB-BAR ============ -->
<div class="border-b border-border bg-card" data-screen-label="Каталог">
  <div class="mx-auto max-w-[1320px] px-6 py-4">
    <nav class="flex items-center gap-2 text-xs text-muted-foreground">
      <a href="index.html" class="hover:text-foreground">Главная</a><span class="text-border-strong">/</span>
      <a href="catalog.html" class="hover:text-foreground">Каталог</a><span class="text-border-strong">/</span>
      <span class="text-foreground">Оптические трансиверы</span>
    </nav>
    <div class="mt-2 flex flex-wrap items-end justify-between gap-3">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Оптические трансиверы</h1>
        <p class="mt-0.5 text-sm text-muted-foreground"><span id="cat-count" class="tnum font-medium text-foreground">14</span> позиций · SFP / SFP+ / SFP28 / QSFP+ / QSFP28 · кодирование под вендора</p>
      </div>
    </div>
  </div>
</div>

<!-- ============ MAIN ============ -->
<main class="mx-auto max-w-[1320px] gap-6 px-6 py-6 lg:flex">

  <!-- ===== Desktop facets ===== -->
  <aside class="hidden w-64 shrink-0 lg:block">
    <div id="cat-filters" class="sticky top-20 space-y-1">
      <!-- search within -->
      <div class="relative mb-3">
        <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="cat-search" type="text" placeholder="Поиск в категории" class="h-9 w-full rounded-md border border-input bg-background pl-9 pr-3 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-ring/25" />
      </div>

      <!-- Скорость -->
      <div class="rounded-lg border border-border">
        <button data-acc class="flex w-full items-center justify-between px-3 py-2.5 text-sm font-medium"><span>Скорость</span><svg class="h-4 w-4 text-muted-foreground transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="space-y-0.5 px-2 pb-2">
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="speed:1" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">1G</span><span class="mono ml-auto text-2xs text-muted-foreground">1</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="speed:10" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">10G</span><span class="mono ml-auto text-2xs text-muted-foreground">7</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="speed:25" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">25G</span><span class="mono ml-auto text-2xs text-muted-foreground">2</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="speed:40" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">40G</span><span class="mono ml-auto text-2xs text-muted-foreground">1</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="speed:100" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">100G</span><span class="mono ml-auto text-2xs text-muted-foreground">3</span></label>
        </div>
      </div>

      <!-- Тип среды -->
      <div class="rounded-lg border border-border">
        <button data-acc class="flex w-full items-center justify-between px-3 py-2.5 text-sm font-medium"><span>Тип среды</span><svg class="h-4 w-4 text-muted-foreground transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="space-y-0.5 px-2 pb-2">
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="media:SMF" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Одномод (SMF)</span><span class="mono ml-auto text-2xs text-muted-foreground">9</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="media:MMF" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Многомод (MMF)</span><span class="mono ml-auto text-2xs text-muted-foreground">4</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="media:DAC" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Медь (DAC)</span><span class="mono ml-auto text-2xs text-muted-foreground">1</span></label>
        </div>
      </div>

      <!-- Дальность (visual range) -->
      <div class="rounded-lg border border-border">
        <button data-acc class="flex w-full items-center justify-between px-3 py-2.5 text-sm font-medium"><span>Дальность</span><svg class="h-4 w-4 text-muted-foreground transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="px-3 pb-3 pt-1">
          <div class="relative h-1.5 rounded-full bg-muted">
            <div class="absolute left-[8%] right-[28%] h-1.5 rounded-full bg-primary"></div>
            <div class="absolute left-[8%] top-1/2 h-4 w-4 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-primary bg-card shadow-sm"></div>
            <div class="absolute right-[28%] top-1/2 h-4 w-4 translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-primary bg-card shadow-sm"></div>
          </div>
          <div class="mono mt-2 flex justify-between text-2xs text-muted-foreground"><span>3 м</span><span>80 км</span></div>
        </div>
      </div>

      <!-- Разъём -->
      <div class="rounded-lg border border-border">
        <button data-acc class="flex w-full items-center justify-between px-3 py-2.5 text-sm font-medium"><span>Разъём</span><svg class="h-4 w-4 text-muted-foreground transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="space-y-0.5 px-2 pb-2">
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="conn:LC" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">LC</span><span class="mono ml-auto text-2xs text-muted-foreground">10</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="conn:MPO" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">MPO-12</span><span class="mono ml-auto text-2xs text-muted-foreground">2</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="conn:QSFP28" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">DAC прямой</span><span class="mono ml-auto text-2xs text-muted-foreground">1</span></label>
        </div>
      </div>

      <!-- DOM -->
      <div class="rounded-lg border border-border">
        <button data-acc class="flex w-full items-center justify-between px-3 py-2.5 text-sm font-medium"><span>DOM / DDM</span><svg class="h-4 w-4 text-muted-foreground transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="space-y-0.5 px-2 pb-2">
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="dom:yes" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">С поддержкой DOM</span><span class="mono ml-auto text-2xs text-muted-foreground">12</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" data-facet="dom:no" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Без DOM</span><span class="mono ml-auto text-2xs text-muted-foreground">1</span></label>
        </div>
      </div>

      <!-- Совместимость -->
      <div class="rounded-lg border border-border">
        <button data-acc class="flex w-full items-center justify-between px-3 py-2.5 text-sm font-medium"><span>Совместимость</span><svg class="h-4 w-4 text-muted-foreground transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
        <div class="space-y-0.5 px-2 pb-2">
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Cisco</span><span class="mono ml-auto text-2xs text-muted-foreground">13</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Juniper</span><span class="mono ml-auto text-2xs text-muted-foreground">11</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">Arista</span><span class="mono ml-auto text-2xs text-muted-foreground">10</span></label>
          <label class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-1.5 hover:bg-accent"><input type="checkbox" class="h-4 w-4 rounded border-input accent-[hsl(var(--primary))]" /><span class="text-sm">MikroTik</span><span class="mono ml-auto text-2xs text-muted-foreground">8</span></label>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== Results column ===== -->
  <div class="min-w-0 flex-1">
    <!-- toolbar -->
    <div class="mb-4 flex flex-wrap items-center gap-2">
      <button id="cat-mobile-open" class="inline-flex h-9 items-center gap-2 rounded-md border border-border bg-card px-3 text-sm font-medium lg:hidden">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18M6 12h12M10 19h4"/></svg>Фильтры
      </button>
      <div class="relative">
        <select id="cat-sort" class="h-9 appearance-none rounded-md border border-input bg-card pl-3 pr-9 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-ring/25">
          <option value="pop">По популярности</option>
          <option value="price-asc">Цена ↑</option>
          <option value="price-desc">Цена ↓</option>
          <option value="speed">По скорости</option>
          <option value="reach">По дальности</option>
        </select>
        <svg class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="ml-auto inline-flex items-center rounded-md border border-border bg-muted p-0.5">
        <button data-view="grid" class="flex h-8 w-8 items-center justify-center rounded bg-card text-foreground shadow-xs" aria-label="Сетка"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
        <button data-view="list" class="flex h-8 w-8 items-center justify-center rounded text-muted-foreground" aria-label="Список"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
      </div>
    </div>

    <!-- active chips -->
    <div id="cat-chips" class="mb-4 flex flex-wrap items-center gap-2"></div>

    <!-- results -->
    <div id="cat-results" class="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-3"></div>

    <!-- pagination -->
    <div class="mt-8 flex items-center justify-between border-t border-border pt-5">
      <p class="text-sm text-muted-foreground">Показаны <span class="tnum text-foreground">1–14</span> из <span class="tnum text-foreground">14</span></p>
      <div class="flex items-center gap-1">
        <button class="flex h-9 w-9 items-center justify-center rounded-md border border-border text-muted-foreground hover:bg-accent" disabled><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
        <button class="mono flex h-9 w-9 items-center justify-center rounded-md bg-primary text-sm font-medium text-primary-foreground">1</button>
        <button class="mono flex h-9 w-9 items-center justify-center rounded-md border border-border text-sm hover:bg-accent">2</button>
        <button class="mono flex h-9 w-9 items-center justify-center rounded-md border border-border text-sm hover:bg-accent">3</button>
        <button class="flex h-9 w-9 items-center justify-center rounded-md border border-border hover:bg-accent"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>
    </div>
  </div>
</main>

<!-- ===== Mobile offcanvas ===== -->
<div id="cat-offcanvas" class="fixed inset-0 z-[60] hidden lg:hidden">
  <div data-off-close class="absolute inset-0 bg-foreground/30 backdrop-blur-[2px]"></div>
  <div class="absolute left-0 top-0 flex h-full w-[88vw] max-w-sm flex-col bg-background shadow-lg">
    <div class="flex items-center justify-between border-b border-border px-4 py-3">
      <h2 class="text-sm font-semibold">Фильтры</h2>
      <button data-off-close class="flex h-8 w-8 items-center justify-center rounded-md hover:bg-accent" aria-label="Закрыть"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="cat-offcanvas-body" class="flex-1 space-y-1 overflow-y-auto p-4"></div>
    <div class="border-t border-border p-3">
      <button data-off-close class="flex h-11 w-full items-center justify-center rounded-md bg-primary text-sm font-medium text-primary-foreground">Показать позиции</button>
    </div>
  </div>
</div>

<!-- ===== Compare tray ===== -->
<div id="cat-tray" class="fixed inset-x-0 bottom-0 z-50 translate-y-full border-t border-border bg-card/95 shadow-lg backdrop-blur transition-transform">
  <div class="mx-auto flex max-w-[1320px] items-center gap-4 px-6 py-3">
    <div class="flex items-center gap-2 text-sm font-medium"><svg class="h-4 w-4 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>Сравнение <span id="tray-count" class="mono rounded bg-primary px-1.5 text-2xs text-primary-foreground">0</span></div>
    <div id="tray-items" class="flex flex-1 flex-wrap items-center gap-2 overflow-hidden"></div>
    <a href="compare.html" class="inline-flex h-9 shrink-0 items-center gap-2 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground hover:bg-primary-hover">Сравнить <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
  </div>
</div>

<script src="assets/app.js"></script>
<script src="assets/module-art.js"></script>
<script src="assets/catalog.js"></script>
</body>
</html>
