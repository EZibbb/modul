<!DOCTYPE html>
<html lang="ru" class="">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сравнение модулей — Modul comp</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw-setup.js"></script>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/base.css" />
<script>
  (function(){ if (localStorage.getItem('modul-theme')==='dark') document.documentElement.classList.add('dark'); })();
  function toggleTheme(){ const r=document.documentElement; r.classList.toggle('dark'); localStorage.setItem('modul-theme', r.classList.contains('dark')?'dark':'light'); }
</script>
</head>
<body class="bg-background font-sans text-foreground antialiased">

<!-- ============ HEADER ============ -->
<header class="sticky top-0 z-40 border-b border-border bg-background/90 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-[1320px] items-center gap-5 px-6">
    <a href="index.html" class="flex shrink-0 items-center gap-2.5">
      <span class="flex h-8 w-8 items-center justify-center rounded-md bg-primary text-primary-foreground"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg></span>
      <span class="text-[17px] font-semibold tracking-tight">Modul<span class="font-normal text-muted-foreground">&nbsp;comp</span></span>
    </a>
    <div class="relative hidden flex-1 lg:block">
      <button data-mc-open="cmdk" class="flex h-10 w-full items-center gap-2.5 rounded-lg border border-input bg-card px-3.5 text-left shadow-xs transition hover:border-border-strong">
        <svg class="h-4 w-4 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <span class="mono text-sm text-muted-foreground">Поиск по артикулу — напр. MC-QSFP100G-LR4</span>
        <kbd class="mono ml-auto hidden rounded border border-border bg-muted px-1.5 py-0.5 text-2xs text-muted-foreground sm:block">⌘K</kbd>
      </button>
    </div>
    <nav class="hidden items-center gap-1 text-sm xl:flex">
      <a href="catalog.html" class="rounded-md px-3 py-2 text-muted-foreground hover:bg-accent hover:text-foreground">Каталог</a>
      <a href="compatibility.html" class="rounded-md px-3 py-2 text-muted-foreground hover:bg-accent hover:text-foreground">Совместимость</a>
      <a href="calculator.html" class="rounded-md px-3 py-2 text-muted-foreground hover:bg-accent hover:text-foreground">Калькулятор</a>
    </nav>
    <div class="ml-auto flex items-center gap-2 xl:ml-0">
      <button data-mc-open="ai" class="hidden h-9 items-center gap-2 rounded-md border border-primary/30 bg-primary-muted px-3 text-sm font-medium text-primary transition hover:bg-primary hover:text-primary-foreground sm:inline-flex">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a3 3 0 0 1 3 3v1a3 3 0 0 1 3 3 3 3 0 0 1-1 5.6V18a3 3 0 0 1-6 0 3 3 0 0 1-6 0v-2.4A3 3 0 0 1 4 10a3 3 0 0 1 3-3V6a3 3 0 0 1 5-3z"/></svg>ИИ-консультант
      </button>
      <button onclick="toggleTheme()" aria-label="Сменить тему" class="flex h-9 w-9 items-center justify-center rounded-md border border-border hover:bg-accent">
        <svg class="h-4 w-4 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="hidden h-4 w-4 dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <button class="inline-flex h-9 items-center gap-2 rounded-md bg-primary px-3.5 text-sm font-medium text-primary-foreground shadow-xs hover:bg-primary-hover">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h2l2 11h9l2-7H7"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
        <span class="hidden sm:inline">Спецификация</span> <span class="mono rounded bg-primary-foreground/20 px-1.5 text-2xs">5</span>
      </button>
    </div>
  </div>
</header>

<div class="page-head relative overflow-hidden" data-screen-label="Сравнение">
  <div class="hero-grid"></div>
  <div class="hero-glow" style="width:360px;height:230px;top:-110px;right:8%;background:rgba(37,99,235,.20)"></div>
  <div class="pointer-events-none absolute inset-0"><div class="fiber-line" style="top:66%"><span class="pulse" style="--d:9s"></span></div></div>
  <div class="relative mx-auto max-w-[1320px] px-6 py-7">
    <nav class="flex items-center gap-2 text-xs text-slate-400">
      <a href="index.html" class="hover:text-white">Главная</a><span class="text-slate-600">/</span>
      <a href="catalog.html" class="hover:text-white">Каталог</a><span class="text-slate-600">/</span>
      <span class="text-slate-200">Сравнение</span>
    </nav>
    <div class="mt-3 flex flex-wrap items-end justify-between gap-3">
      <div>
        <div class="mono mb-1.5 inline-flex items-center gap-2 text-2xs uppercase tracking-widest text-cyan"><span class="h-1.5 w-1.5 rounded-full bg-cyan shadow-[0_0_8px_2px_rgba(34,211,238,.8)]"></span>до 4 модулей</div>
        <h1 class="text-2xl font-semibold tracking-tight text-white sm:text-3xl">Сравнение модулей</h1>
        <p class="mt-1 text-sm text-slate-400">Выбрано <span id="cmp-count" class="tnum font-medium text-cyan">3</span> из 4 · различающиеся параметры подсвечены.</p>
      </div>
      <label class="flex cursor-pointer items-center gap-2.5 rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm font-medium text-white">
        <span class="relative inline-block h-5 w-9">
          <input id="cmp-onlydiff" type="checkbox" class="peer sr-only" />
          <span class="absolute inset-0 rounded-full bg-white/15 transition peer-checked:bg-cyan"></span>
          <span class="absolute left-0.5 top-0.5 h-4 w-4 rounded-full bg-white shadow transition peer-checked:translate-x-4"></span>
        </span>
        Только различия
      </label>
    </div>
  </div>
</div>

<main class="mx-auto max-w-[1320px] px-6 py-6">

  <!-- comparison table -->
  <div class="mt-5 overflow-x-auto rounded-xl border border-border">
    <table class="w-full border-collapse">
      <thead><tr id="cmp-head"></tr></thead>
      <tbody id="cmp-body"></tbody>
    </table>
  </div>

  <div class="mt-4 flex flex-wrap items-center justify-between gap-3 rounded-lg border border-border bg-subtle px-4 py-3 text-sm">
    <div class="flex items-center gap-2 text-muted-foreground"><span class="inline-block h-2.5 w-2.5 rounded-full bg-warning"></span>Жёлтым подсвечены строки, где значения модулей различаются.</div>
    <button class="inline-flex h-9 items-center gap-2 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground hover:bg-primary-hover">Добавить все в спецификацию</button>
  </div>
</main>

<!-- add-module picker modal -->
<div id="cmp-picker" class="fixed inset-0 z-[60] hidden items-center justify-center p-4">
  <div id="cmp-picker-scrim" class="absolute inset-0 bg-foreground/30 backdrop-blur-[2px]"></div>
  <div class="relative w-full max-w-md overflow-hidden rounded-xl border border-border bg-popover shadow-lg">
    <div class="flex items-center justify-between border-b border-border px-4 py-3">
      <h2 class="text-sm font-semibold">Добавить модуль к сравнению</h2>
      <button id="cmp-picker-close" class="flex h-8 w-8 items-center justify-center rounded-md hover:bg-accent" aria-label="Закрыть"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div id="cmp-picker-list" class="max-h-[60vh] space-y-2 overflow-y-auto p-3"></div>
  </div>
</div>

<button data-mc-open="ai" class="fixed bottom-5 right-5 z-40 flex h-12 items-center gap-2 rounded-full bg-primary px-4 text-sm font-medium text-primary-foreground shadow-lg transition hover:bg-primary-hover">
  <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a3 3 0 0 1 3 3v1a3 3 0 0 1 3 3 3 3 0 0 1-1 5.6V18a3 3 0 0 1-6 0 3 3 0 0 1-6 0v-2.4A3 3 0 0 1 4 10a3 3 0 0 1 3-3V6a3 3 0 0 1 5-3z"/></svg>
  <span class="hidden sm:inline">Со-пилот</span>
</button>

<script src="assets/app.js"></script>
<script src="assets/module-art.js"></script>
<script src="assets/compare.js"></script>
</body>
</html>
